name: Submit a model run
description: Share scored results for a new model or provider.
title: "[Model run]: "
labels: ["model-run", "results"]
body:
  - type: input
    id: model
    attributes:
      label: Model
      description: Provider and exact model identifier.
      placeholder: openai/gpt-4.1-mini
    validations:
      required: true
  - type: textarea
    id: run_details
    attributes:
      label: Run details
      description: Include command, date, decoding settings, provider, retries, and any quota/latency notes.
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts
      description: Link or paste paths for response, score, summary, and manifest artifacts.
    validations:
      required: true
  - type: textarea
    id: observations
    attributes:
      label: Observations
      description: What did the model do well or poorly?
    validations:
      required: false
